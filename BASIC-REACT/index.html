<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miami.edu Search</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div id="app" class="container mt-4"></div>
    <script type="text/babel">
      
      const app = document.getElementById("app");

      function Header({ title }) {
        return <h1> {createTitle(title)} </h1>;
      }
      function Paragraph(props) {
        return <p>{props.text}</p>;
      }
      function createTitle(title) {
        return title ? title : "Default title";
      }

      function Results({ result, currentPage, lastPage, onPageChange }) {
        if (!result || result.length === 0) return null;

        return (
          <div className="mt-4">
            <Paragraph text={`Showing Page ${currentPage} of ${lastPage}`} />
            <h2>Search Results:</h2>
            <table className="table table-striped table-bordered mt-3">
              <thead className="table-light">
                <tr>
                  <th>Title</th>
                  <th>Description</th>
                  <th>Link</th>
                </tr>
              </thead>
              <tbody>
                {result.map((res, index) => (
                  <tr key={index}>
                    <td>{res.alpha}</td>
                    <td>{res.context}</td>
                    <td>
                      <a href={res.url} target="_blank" className="btn btn-sm btn-outline-secondary">
                        View
                      </a>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>

            <div className="d-flex justify-content-between mt-3 mb-5">
              <button 
                className="btn btn-secondary" 
                onClick={() => onPageChange(currentPage - 1)}
                disabled={currentPage <= 1}
              >
                Previous Page
              </button>
              
              <button 
                className="btn btn-primary" 
                onClick={() => onPageChange(currentPage + 1)}
                disabled={currentPage >= lastPage}
              >
                Next Page
              </button>
            </div>
          </div>
        );
      }

      function Homepage() {
        const [searchTerm, setSearchTerm] = React.useState("");
        const [searchResults, setSearchResults] = React.useState([]);
        
        // --- NEW STATE FOR PAGINATION ---
        const [currentPage, setCurrentPage] = React.useState(1);
        const [lastPage, setLastPage] = React.useState(1);

        function performSearch(pageToFetch = 1) {
          // Added &page parameter to the URL
          const searchUrl = `https://www.cdn.miami.edu/_assets-common/php/searchblox/?q=${searchTerm}&page=${pageToFetch}`;
          
          fetch(searchUrl)
            .then((response) => response.json())
            .then((data) => {
              console.log("Search results: ", data);
              setSearchResults(data.result || []);
              
              // Update page tracking based on API response
              setCurrentPage(data.currentPage || 1);
              setLastPage(data.lastPage || 1);
            })
            .catch((error) => {
              console.error("Error performing search: ", error);
            });
        }

        return (
          <>
            <Header title="Welcome to the search page" />
            <Paragraph
              text="Enter a search term to find results from miami.edu"
            />
            
            <div className="mb-3">
              <label htmlFor="search" className="form-label">Search: </label>
              <div className="input-group">
                <input
                  type="text"
                  className="form-control"
                  id="search"
                  placeholder="Search miami.edu..."
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                />
                {/* Reset to page 1 on a brand new search */}
                <button className="btn btn-primary" onClick={() => performSearch(1)}>Search</button>
              </div>
            </div>

            <Results 
              result={searchResults} 
              currentPage={currentPage}
              lastPage={lastPage}
              onPageChange={(newPage) => performSearch(newPage)}
            />
          </>
        );
      }

      const root = ReactDOM.createRoot(app);
      root.render(<Homepage />);
    </script>
  </body>
</html>
